    <main>
        <form method="get" action="record.html">
            <label class="top">Username* <input type="text" id="username" name="username"
                    placeholder="Enter your fullname here" required></label>
            <label class="top">Password* <input type="password" id="pwd" name="pwd" pattern=".{8,}"

            <label class="top">Re-enter Your Password <input type="email" id="password" id="pwd2" name="pwd2"></label>

            <label for="r">Page Rating</label>
            <div id="rangevalue">0</div>
            <input type="range" id="r" name="r" min="0" max="10" value="0" step="1" list="rangevalues">
